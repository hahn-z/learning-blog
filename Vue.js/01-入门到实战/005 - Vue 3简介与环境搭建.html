<h1>005 - Vue 3简介与环境搭建</h1>

<h1>Vue 3简介与环境搭建</h1>

<blockquote><p>📊 <strong>难度：初级</strong> | 🏷️ Vue.js 3.x | ⏱️ 阅读约 15 分钟</p></blockquote>

<hr>

<h2>📖 概念讲解</h2>

<p>Vue.js是一个用于构建用户界面的渐进式JavaScript框架。Vue 3于2020年9月发布，带来了Composition API、更好的TypeScript支持、更小的包体积和更快的渲染性能。</p>

<p><strong>核心特点：</strong></p>

<ul>
<li><strong>渐进式框架</strong>：可以从小到大，逐步引入功能。你可以在页面中只用一个<code><script></code>标签引入Vue，也可以使用完整的工程化方案。</li>
<li><strong>响应式系统</strong>：基于Proxy实现的响应式系统，自动追踪依赖关系，数据变化时自动更新DOM。</li>
<li><strong>组件化开发</strong>：将页面拆分为独立、可复用的组件，每个组件包含自己的模板、逻辑和样式。</li>
<li><strong>虚拟DOM</strong>：通过虚拟DOM diff算法，最小化真实DOM操作，提升性能。</li>

<p><strong>Vue 3的三大API风格：</strong></p>

<table><thead><tr>
<th>风格</th>
<th>说明</th>
<th>适用场景</th>
</tr></thead><tbody>
<tr>
<td>Options API</td>
<td>选项式API，Vue 2风格</td>
<td>简单组件、初学者</td>
</tr>
<tr>
<td>Composition API</td>
<td>组合式API，setup函数</td>
<td>复杂逻辑复用</td>
</tr>
<tr>
<td><code><script setup></code></td>
<td>Composition API的语法糖</td>
<td>推荐的开发方式</td>
</tr>
</tbody></table>

<p><strong>开发环境需求：</strong></p>

<ul>
<li>Node.js ≥ 16.x</li>
<li>npm ≥ 7.x 或 pnpm</li>
<li>编辑器推荐 VS Code + Volar插件</li>


<h2>🧠 知识脑图</h2>

<pre><code>Vue 3 入门
├── 核心概念
│   ├── 渐进式框架
│   ├── 响应式系统 (Proxy)
│   ├── 组件化开发
│   └── 虚拟DOM
├── 开发环境
│   ├── Node.js &gt;= 16
│   ├── VS Code + Volar
│   └── Vite 构建工具
├── 项目创建
│   ├── npm create vue@latest
│   ├── Vite 脚手架
│   └── 项目结构解析
└── 开发流程
    ├── 开发服务器 (npm run dev)
    ├── 热模块替换 (HMR)
    └── 构建打包 (npm run build)</code></pre>

<h2>💻 完整代码</h2>

<pre><code class="language-vue">&lt;!-- App.vue - Vue 3 Application Entry --&gt;
&lt;template&gt;
  &lt;div class=&quot;app&quot;&gt;
    &lt;h1&gt;{{ greeting }}&lt;/h1&gt;
    &lt;!-- v-model for two-way binding --&gt;
    &lt;input v-model=&quot;name&quot; placeholder=&quot;Enter your name&quot; /&gt;
    &lt;!-- Conditional rendering --&gt;
    &lt;p v-if=&quot;name&quot;&gt;Hello, {{ name }}! Welcome to Vue 3!&lt;/p&gt;
    &lt;p v-else&gt;Please enter your name above.&lt;/p&gt;

    &lt;!-- List rendering --&gt;
    &lt;h2&gt;Vue 3 Core Features&lt;/h2&gt;
    &lt;ul&gt;
      &lt;li v-for=&quot;feature in features&quot; :key=&quot;feature.name&quot;&gt;
        {{ feature.name }}: {{ feature.desc }}
      &lt;/li&gt;
    &lt;/ul&gt;

    &lt;!-- Event handling --&gt;
    &lt;button @click=&quot;counter++&quot;&gt;Clicked {{ counter }} times&lt;/button&gt;
    &lt;button @click=&quot;resetAll&quot;&gt;Reset All&lt;/button&gt;
  &lt;/div&gt;
&lt;/template&gt;

&lt;script setup&gt;
import { ref, computed } from &#x27;vue&#x27;

// Reactive state declarations
const name = ref(&#x27;&#x27;)
const counter = ref(0)

// Computed property
const greeting = computed(() =&gt; {
  return name.value ? `Hello, ${name.value}!` : &#x27;Welcome to Vue 3&#x27;
})

// Feature list data
const features = ref([
  { name: &#x27;Composition API&#x27;, desc: &#x27;Flexible logic composition&#x27; },
  { name: &#x27;Proxy Reactivity&#x27;, desc: &#x27;Deep reactive tracking&#x27; },
  { name: &#x27;Fragment&#x27;, desc: &#x27;Multiple root elements&#x27; },
  { name: &#x27;Teleport&#x27;, desc: &#x27;Render content anywhere&#x27; },
])

// Method: reset all state
function resetAll() {
  name.value = &#x27;&#x27;
  counter.value = 0
}
&lt;/script&gt;

&lt;style scoped&gt;
.app {
  max-width: 600px;
  margin: 2rem auto;
  padding: 1rem;
  font-family: sans-serif;
}
input {
  padding: 0.5rem;
  margin: 1rem 0;
  width: 100%;
  font-size: 1rem;
}
button {
  padding: 0.5rem 1rem;
  margin: 0.5rem;
  cursor: pointer;
}
&lt;/style&gt;</code></pre>

<h2>⚠️ 注意事项</h2>

<table><thead><tr>
<th>注意点</th>
<th>说明</th>
<th>建议</th>
</tr></thead><tbody>
<tr>
<td>Node.js版本</td>
<td>Vue 3需要Node.js ≥ 16</td>
<td>使用nvm管理Node版本</td>
</tr>
<tr>
<td>Vite vs Webpack</td>
<td>Vue 3官方推荐Vite</td>
<td>新项目用Vite，老项目可保留Webpack</td>
</tr>
<tr>
<td>浏览器兼容</td>
<td>Vue 3不支持IE11</td>
<td>如需IE兼容，使用Vue 2</td>
</tr>
<tr>
<td>Volar vs Vetur</td>
<td>Vetur是Vue 2插件</td>
<td>Vue 3项目必须用Volar</td>
</tr>
<tr>
<td>开发工具</td>
<td>需要Vue DevTools浏览器扩展</td>
<td>安装Vue DevTools beta版本</td>
</tr>
</tbody></table>

<h2>🚫 避坑指南</h2>

<h3>1. Node版本过低</h3>
<p>❌ <strong>错误：</strong> 直接用系统自带Node，版本过旧导致依赖安装失败</p>
<p>✅ <strong>正确：</strong> 使用nvm安装Node.js 18+，确保版本兼容</p>

<h3>2. 混用Vetur和Volar</h3>
<p>❌ <strong>错误：</strong> 同时安装Vetur和Volar插件，导致语法高亮冲突</p>
<p>✅ <strong>正确：</strong> Vue 3项目禁用Vetur，只使用Volar</p>

<h3>3. CDN引入方式开发</h3>
<p>❌ <strong>错误：</strong> 用<code><script src="vue.js"></code>开发完整项目，无法使用SFC</p>
<p>✅ <strong>正确：</strong> 使用Vite创建项目，享受SFC和HMR</p>

<h3>4. 修改生成的文件后不生效</h3>
<p>❌ <strong>错误：</strong> 修改了文件但浏览器没有更新，疯狂刷新</p>
<p>✅ <strong>正确：</strong> 检查终端是否报错，Vite的HMR会在控制台显示错误信息</p>

<h2>🧪 练习题</h2>

<h3>🟢 基础题</h3>
<ol>
<li>使用<code>npm create vue@latest</code>创建一个新项目，说明每一步选择了什么配置。</li>
</ul>
<ol>
<li>在<code>App.vue</code>中添加一个<code><h2></code>标签显示当前日期，使用<code>ref</code>存储。</li>

<h3>🟡 进阶题</h3>
<ol>
<li>创建一个组件<code>Counter.vue</code>，包含增减按钮和重置按钮，在<code>App.vue</code>中使用它。</li>
</ul>
<ol>
<li>尝试修改Vite配置，将开发服务器端口改为3000。</li>

<h3>🔴 挑战题</h3>
<ol>
<li>创建一个多页面应用（至少3个组件），通过条件渲染切换页面，不使用Vue Router。</li>

<pre><code>Vue 3 入门知识树
├── 框架概述
│   ├── 渐进式 = 按需引入
│   ├── 响应式 = 数据驱动视图
│   └── 组件化 = 拆分复用
├── 环境搭建
│   ├── Node.js + npm
│   ├── Vite 脚手架
│   └── VS Code + Volar
├── 项目结构
│   ├── src/App.vue → 根组件
│   ├── src/main.js → 入口文件
│   └── index.html → HTML模板
├── 核心语法
│   ├── {{ }} → 插值
│   ├── v-model → 双向绑定
│   ├── v-if/v-for → 控制
│   └── @click → 事件
└── 开发流程
    ├── dev → 开发
    ├── build → 构建
    └── preview → 预览</code></pre>

<h2>🚀 代码演进</h2>

<h3>v1 - 最简Vue应用（CDN方式）</h3>

<pre><code class="language-html">&lt;!-- index.html - Simplest Vue 3 app via CDN --&gt;
&lt;div id=&quot;app&quot;&gt;{{ message }}&lt;/div&gt;
&lt;script src=&quot;https://unpkg.com/vue@3&quot;&gt;&lt;/script&gt;
&lt;script&gt;
  Vue.createApp({
    data() { return { message: &#x27;Hello Vue 3!&#x27; } }
  }).mount(&#x27;#app&#x27;)
&lt;/script&gt;</code></pre>

<h3>v2 - Options API单文件组件</h3>

<pre><code class="language-vue">&lt;!-- App.vue - Options API style --&gt;
&lt;template&gt;
  &lt;h1&gt;{{ message }}&lt;/h1&gt;
&lt;/template&gt;

&lt;script&gt;
export default {
  data() {
    return { message: &#x27;Hello Vue 3!&#x27; }
  }
}
&lt;/script&gt;</code></pre>

<h3>v3 - Composition API + script setup（推荐）</h3>

<pre><code class="language-vue">&lt;!-- App.vue - Modern &lt;script setup&gt; style --&gt;
&lt;template&gt;
  &lt;h1&gt;{{ message }}&lt;/h1&gt;
&lt;/template&gt;

&lt;script setup&gt;
import { ref } from &#x27;vue&#x27;
const message = ref(&#x27;Hello Vue 3!&#x27;)
&lt;/script&gt;</code></pre>
